services:
  db:
    image: postgres:16-alpine
    container_name: taskmanager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskmanagerfinal}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: taskmanager-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/taskmanagerfinal?schema=public}
      JWT_SECRET: ${JWT_SECRET:-super_secret_key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
    command: >
      sh -c "npx prisma generate &&
             npx prisma migrate deploy &&
             npm run dev"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: taskmanager-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
volumes:
  postgres_data:
