name: CI

on:
  push:
      branches: [main]
  pull_request:
      branches: [main]

jobs:
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  tests:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run --coverage

  # e2e:
  #   name: Pruebas e2e
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: ./frontend
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #         cache: npm
  #         cache-dependency-path: frontend/package-lock.json
  #     - run: npm ci
  #     - run: npx playwright install --with-deps chromium
  #     - run: npx playwright test --project chromium

  e2e:
    name: Pruebas e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name : Iniciar aplicacion (docker compose)
        run: docker compose up db backend -d --build

      - name: Instalar Playwright...
        working-directory: ./frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Pruebas e2e con Playwright
        working-directory: ./frontend
        run: |
          npx playwright test --project chromium

      - name: Mostrar logs si falla
        if: failure()
        run: docker compose logs

      - name: Parando Aplicacion (docker compose)
        if: always()
        run: docker compose down -v
